name: build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write  # to push to ghcr.io

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      # Build prod + dev in parallel; if one fails the other still completes so
      # you always get at least one usable image per push.
      fail-fast: false
      matrix:
        include:
          - target: prod
            suffix: ""
          - target: dev
            suffix: "-dev"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tag
        run: |
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          suffix="${{ matrix.suffix }}"
          echo "sha_tag=${image}:${short_sha}${suffix}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${image}:latest${suffix}"    >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.tag.outputs.sha_tag }}
            ${{ steps.tag.outputs.latest_tag }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
